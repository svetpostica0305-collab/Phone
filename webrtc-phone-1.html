<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebRTC Звонилка</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --bg: #0a0e1a;
    --panel: #0f1628;
    --border: #1e3a5f;
    --accent: #00d4ff;
    --accent2: #00ff88;
    --danger: #ff3b5c;
    --text: #c8e6ff;
    --dim: #4a7a9b;
    --glow: 0 0 20px rgba(0, 212, 255, 0.4);
    --glow2: 0 0 20px rgba(0, 255, 136, 0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 50%, rgba(0,100,200,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(0,212,255,0.06) 0%, transparent 50%);
    pointer-events: none;
  }

  /* Scanlines */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  .phone {
    width: 380px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 28px 24px;
    box-shadow: 
      0 0 0 1px rgba(0,212,255,0.1),
      0 30px 80px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.05);
    position: relative;
  }

  .phone-header {
    text-align: center;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .phone-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    font-weight: 900;
    color: var(--accent);
    text-shadow: var(--glow);
    letter-spacing: 3px;
  }

  .phone-subtitle {
    font-size: 10px;
    color: var(--dim);
    margin-top: 4px;
    letter-spacing: 2px;
  }

  /* Status dot */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: center;
    margin-top: 10px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--dim);
    transition: all 0.3s;
  }

  .status-dot.online { 
    background: var(--accent2); 
    box-shadow: var(--glow2);
    animation: pulse 2s infinite;
  }

  .status-dot.calling { 
    background: var(--accent); 
    box-shadow: var(--glow);
    animation: pulse 0.8s infinite;
  }

  .status-dot.active { 
    background: var(--accent2); 
    box-shadow: var(--glow2);
  }

  .status-dot.error { background: var(--danger); }

  .status-text {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 1px;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* My ID block */
  .my-id-block {
    background: rgba(0,212,255,0.05);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 20px;
    text-align: center;
  }

  .my-id-label {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  .my-id-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    text-shadow: var(--glow);
    letter-spacing: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .my-id-value:hover {
    text-shadow: 0 0 30px rgba(0,212,255,0.8);
  }

  .copy-hint {
    font-size: 9px;
    color: var(--dim);
    margin-top: 4px;
    letter-spacing: 1px;
  }

  /* Display */
  .display {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 20px;
    min-height: 54px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .display-number {
    font-family: 'Orbitron', sans-serif;
    font-size: 26px;
    font-weight: 400;
    color: #fff;
    letter-spacing: 2px;
    flex: 1;
    min-height: 32px;
  }

  .display-number.placeholder {
    font-size: 13px;
    color: var(--dim);
    letter-spacing: 1px;
    font-family: 'Share Tech Mono', monospace;
    font-weight: normal;
  }

  .backspace-btn {
    background: none;
    border: none;
    color: var(--dim);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    transition: all 0.15s;
    line-height: 1;
  }

  .backspace-btn:hover { color: var(--accent); }

  /* Keypad */
  .keypad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }

  .key {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 0;
    text-align: center;
    cursor: pointer;
    transition: all 0.12s;
    user-select: none;
    position: relative;
    overflow: hidden;
  }

  .key::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(0,212,255,0.15), transparent 70%);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .key:hover { border-color: rgba(0,212,255,0.4); }
  .key:active::before { opacity: 1; }
  .key:active { transform: scale(0.95); border-color: var(--accent); }

  .key-digit {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
  }

  .key-letters {
    font-size: 8px;
    color: var(--dim);
    letter-spacing: 1.5px;
    margin-top: 3px;
  }

  /* Action buttons */
  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  .btn {
    border: none;
    border-radius: 14px;
    padding: 16px 12px;
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-call {
    background: linear-gradient(135deg, #00c853, #00e676);
    color: #001a00;
    box-shadow: 0 4px 20px rgba(0,200,83,0.3);
    grid-column: 1 / -1;
  }

  .btn-call:hover { 
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,200,83,0.5);
  }

  .btn-call:active { transform: translateY(0); }

  .btn-call:disabled {
    background: rgba(255,255,255,0.1);
    color: var(--dim);
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
  }

  .btn-hangup {
    background: linear-gradient(135deg, #c62828, #ff3b5c);
    color: #fff;
    box-shadow: 0 4px 20px rgba(255,59,92,0.3);
    grid-column: 1 / -1;
  }

  .btn-hangup:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(255,59,92,0.5);
  }

  .btn-mute {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .btn-mute:hover { border-color: var(--accent); }
  .btn-mute.active {
    background: rgba(0,212,255,0.15);
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn-video {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .btn-video:hover { border-color: var(--accent); }
  .btn-video.active {
    background: rgba(0,212,255,0.15);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Call screen */
  .call-screen {
    display: none;
    text-align: center;
    padding: 10px 0;
    margin-bottom: 16px;
  }

  .call-screen.visible { display: block; }

  .call-peer-id {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 4px;
    margin-bottom: 8px;
  }

  .call-timer {
    font-size: 13px;
    color: var(--accent2);
    letter-spacing: 2px;
  }

  /* Incoming call */
  .incoming-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(10,14,26,0.96);
    border-radius: 24px;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    z-index: 10;
  }

  .incoming-overlay.visible { display: flex; }

  .incoming-ring {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    animation: ring 1s ease-in-out infinite;
    box-shadow: 0 0 0 0 rgba(0,212,255,0.4);
  }

  @keyframes ring {
    0% { box-shadow: 0 0 0 0 rgba(0,212,255,0.5); }
    70% { box-shadow: 0 0 0 25px rgba(0,212,255,0); }
    100% { box-shadow: 0 0 0 0 rgba(0,212,255,0); }
  }

  .incoming-text {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    color: var(--dim);
    letter-spacing: 2px;
  }

  .incoming-from {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 4px;
    text-shadow: var(--glow);
  }

  .incoming-actions {
    display: flex;
    gap: 20px;
  }

  .btn-accept {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #00c853, #00e676);
    color: #001a00;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,200,83,0.4);
    transition: all 0.15s;
  }

  .btn-accept:hover { transform: scale(1.1); }

  .btn-decline {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #c62828, #ff3b5c);
    color: #fff;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(255,59,92,0.4);
    transition: all 0.15s;
  }

  .btn-decline:hover { transform: scale(1.1); }

  /* Video */
  .video-container {
    display: none;
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 16px;
    background: #000;
  }

  .video-container.visible { display: block; }

  #remoteVideo {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
  }

  #localVideo {
    position: absolute;
    bottom: 8px;
    right: 8px;
    width: 80px;
    height: 60px;
    border-radius: 8px;
    object-fit: cover;
    border: 2px solid var(--accent);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(0,212,255,0.15);
    border: 1px solid rgba(0,212,255,0.3);
    color: var(--accent);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 12px;
    letter-spacing: 1px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 200;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Sections visibility */
  .section-idle .call-screen { display: none; }
  .section-idle .btn-hangup { display: none; }
  .section-idle .btn-call { display: flex; }

  .section-call .btn-call { display: none; }
  .section-call .btn-hangup { display: flex; }
  .section-call .call-screen { display: block; }
</style>
</head>
<body>

<div class="phone" id="phone">

  <!-- Incoming call overlay -->
  <div class="incoming-overlay" id="incomingOverlay">
    <div class="incoming-ring">📞</div>
    <div class="incoming-text">ВХОДЯЩИЙ ЗВОНОК</div>
    <div class="incoming-from" id="incomingFrom">----</div>
    <div class="incoming-actions">
      <button class="btn-accept" onclick="acceptCall()" title="Принять">✓</button>
      <button class="btn-decline" onclick="declineCall()" title="Отклонить">✕</button>
    </div>
  </div>

  <div class="phone-header">
    <div class="phone-title">WEBCALL</div>
    <div class="phone-subtitle">WebRTC · P2P · NO SIM</div>
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <div class="status-text" id="statusText">ПОДКЛЮЧЕНИЕ...</div>
    </div>
  </div>

  <!-- My ID -->
  <div class="my-id-block">
    <div class="my-id-label">МОЙ ID (дай другу)</div>
    <div class="my-id-value" id="myId" onclick="copyId()">----</div>
    <div class="copy-hint">нажми чтобы скопировать</div>
  </div>

  <!-- Video -->
  <div class="video-container" id="videoContainer">
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay playsinline muted></video>
  </div>

  <!-- Call screen (shown during call) -->
  <div class="call-screen" id="callScreen">
    <div class="call-peer-id" id="callPeerId">----</div>
    <div class="call-timer" id="callTimer">00:00</div>
  </div>

  <!-- Number display -->
  <div class="display" id="displayBlock">
    <div class="display-number placeholder" id="displayNumber">введи ID друга...</div>
    <button class="backspace-btn" onclick="backspace()">⌫</button>
  </div>

  <!-- Keypad -->
  <div class="keypad" id="keypad">
    <div class="key" onclick="pressKey('1')"><div class="key-digit">1</div><div class="key-letters"></div></div>
    <div class="key" onclick="pressKey('2')"><div class="key-digit">2</div><div class="key-letters">ABC</div></div>
    <div class="key" onclick="pressKey('3')"><div class="key-digit">3</div><div class="key-letters">DEF</div></div>
    <div class="key" onclick="pressKey('4')"><div class="key-digit">4</div><div class="key-letters">GHI</div></div>
    <div class="key" onclick="pressKey('5')"><div class="key-digit">5</div><div class="key-letters">JKL</div></div>
    <div class="key" onclick="pressKey('6')"><div class="key-digit">6</div><div class="key-letters">MNO</div></div>
    <div class="key" onclick="pressKey('7')"><div class="key-digit">7</div><div class="key-letters">PQRS</div></div>
    <div class="key" onclick="pressKey('8')"><div class="key-digit">8</div><div class="key-letters">TUV</div></div>
    <div class="key" onclick="pressKey('9')"><div class="key-digit">9</div><div class="key-letters">WXYZ</div></div>
    <div class="key" onclick="pressKey('*')"><div class="key-digit">✱</div></div>
    <div class="key" onclick="pressKey('0')"><div class="key-digit">0</div><div class="key-letters">+</div></div>
    <div class="key" onclick="pressKey('#')"><div class="key-digit">#</div></div>
  </div>

  <!-- Actions -->
  <div class="actions" id="actionsBlock">
    <button class="btn btn-call" id="callBtn" onclick="makeCall()" disabled>📞 ПОЗВОНИТЬ</button>
    <button class="btn btn-hangup" id="hangupBtn" onclick="hangUp()" style="display:none">📵 ЗАВЕРШИТЬ</button>
    <button class="btn btn-mute" id="muteBtn" onclick="toggleMute()">🎤 МИК</button>
    <button class="btn btn-video" id="videoBtn" onclick="toggleVideo()">📷 ВИДЕО</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
let peer = null;
let currentCall = null;
let localStream = null;
let inputNumber = '';
let isMuted = false;
let isVideo = false;
let timerInterval = null;
let timerSeconds = 0;
let incomingCall = null;

function showToast(msg, duration = 2000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function setStatus(text, state) {
  document.getElementById('statusText').textContent = text;
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot ' + (state || '');
}

function updateDisplay() {
  const el = document.getElementById('displayNumber');
  if (inputNumber) {
    el.textContent = inputNumber;
    el.className = 'display-number';
  } else {
    el.textContent = 'введи ID друга...';
    el.className = 'display-number placeholder';
  }
  document.getElementById('callBtn').disabled = inputNumber.length < 2 || !peer;
}

function pressKey(k) {
  if (currentCall) return;
  inputNumber += k;
  updateDisplay();
  // click sound
  playTone(800, 0.05, 0.08);
}

function backspace() {
  if (currentCall) return;
  inputNumber = inputNumber.slice(0, -1);
  updateDisplay();
}

function playTone(freq, vol, dur) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = freq;
    gain.gain.value = vol;
    osc.start();
    setTimeout(() => { gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1); osc.stop(ctx.currentTime + 0.1); }, dur * 1000);
  } catch(e) {}
}

function copyId() {
  const id = document.getElementById('myId').textContent;
  if (id === '----') return;
  navigator.clipboard.writeText(id).then(() => showToast('✓ ID скопирован!'));
}

function startTimer() {
  timerSeconds = 0;
  timerInterval = setInterval(() => {
    timerSeconds++;
    const m = String(Math.floor(timerSeconds/60)).padStart(2,'0');
    const s = String(timerSeconds%60).padStart(2,'0');
    document.getElementById('callTimer').textContent = m + ':' + s;
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}

function showCallScreen(peerId) {
  document.getElementById('displayBlock').style.display = 'none';
  document.getElementById('keypad').style.display = 'none';
  document.getElementById('callBtn').style.display = 'none';
  document.getElementById('hangupBtn').style.display = 'flex';
  document.getElementById('callScreen').classList.add('visible');
  document.getElementById('callPeerId').textContent = peerId;
  startTimer();
}

function hideCallScreen() {
  document.getElementById('displayBlock').style.display = 'flex';
  document.getElementById('keypad').style.display = 'grid';
  document.getElementById('callBtn').style.display = 'flex';
  document.getElementById('hangupBtn').style.display = 'none';
  document.getElementById('callScreen').classList.remove('visible');
  document.getElementById('videoContainer').classList.remove('visible');
  stopTimer();
}

async function getMedia(video = false) {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: video });
    return stream;
  } catch(e) {
    try {
      return await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch(e2) {
      showToast('⚠ Нет доступа к микрофону!', 3000);
      return null;
    }
  }
}

async function makeCall() {
  if (!peer || !inputNumber) return;
  const targetId = inputNumber.trim();
  
  localStream = await getMedia(isVideo);
  if (!localStream) return;

  if (isVideo) {
    document.getElementById('localVideo').srcObject = localStream;
    document.getElementById('videoContainer').classList.add('visible');
  }

  const call = peer.call(targetId, localStream);
  currentCall = call;

  setStatus('ЗВОНОК...', 'calling');
  showCallScreen(targetId);

  call.on('stream', (remoteStream) => {
    setStatus('РАЗГОВОР', 'active');
    const remoteVideo = document.getElementById('remoteVideo');
    remoteVideo.srcObject = remoteStream;
    if (isVideo) document.getElementById('videoContainer').classList.add('visible');
  });

  call.on('close', () => {
    onCallEnded();
  });

  call.on('error', (err) => {
    showToast('Ошибка: ' + err.message, 3000);
    onCallEnded();
  });
}

function hangUp() {
  if (currentCall) {
    currentCall.close();
  }
  onCallEnded();
}

function onCallEnded() {
  currentCall = null;
  if (localStream) {
    localStream.getTracks().forEach(t => t.stop());
    localStream = null;
  }
  hideCallScreen();
  setStatus('ОНЛАЙН', 'online');
  inputNumber = '';
  updateDisplay();
  playTone(300, 0.1, 0.3);
}

async function acceptCall() {
  if (!incomingCall) return;
  document.getElementById('incomingOverlay').classList.remove('visible');

  localStream = await getMedia(isVideo);
  if (!localStream) return;

  if (isVideo) {
    document.getElementById('localVideo').srcObject = localStream;
  }

  incomingCall.answer(localStream);
  currentCall = incomingCall;
  incomingCall = null;

  currentCall.on('stream', (remoteStream) => {
    setStatus('РАЗГОВОР', 'active');
    document.getElementById('remoteVideo').srcObject = remoteStream;
    if (isVideo) document.getElementById('videoContainer').classList.add('visible');
  });

  currentCall.on('close', onCallEnded);

  showCallScreen(currentCall.peer);
  setStatus('РАЗГОВОР', 'active');
}

function declineCall() {
  if (incomingCall) {
    incomingCall.close();
    incomingCall = null;
  }
  document.getElementById('incomingOverlay').classList.remove('visible');
  setStatus('ОНЛАЙН', 'online');
}

function toggleMute() {
  isMuted = !isMuted;
  if (localStream) {
    localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
  }
  const btn = document.getElementById('muteBtn');
  btn.textContent = isMuted ? '🔇 БЕЗ ЗВУКА' : '🎤 МИК';
  btn.classList.toggle('active', isMuted);
}

function toggleVideo() {
  isVideo = !isVideo;
  const btn = document.getElementById('videoBtn');
  btn.textContent = isVideo ? '📷 ВИДЕО ВКЛ' : '📷 ВИДЕО';
  btn.classList.toggle('active', isVideo);
  showToast(isVideo ? 'Видео включено' : 'Только аудио');
}

// Init PeerJS
function initPeer() {
  setStatus('ПОДКЛЮЧЕНИЕ...', '');

  // Use saved ID or generate once
  let shortId = localStorage.getItem('myPeerId');
  if (!shortId) {
    shortId = Math.floor(1000 + Math.random() * 9000).toString();
    localStorage.setItem('myPeerId', shortId);
  }

  peer = new Peer(shortId, {
    host: '0.peerjs.com',
    port: 443,
    path: '/',
    secure: true,
    debug: 0,
    config: {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' }
      ]
    }
  });

  peer.on('open', (id) => {
    document.getElementById('myId').textContent = id;
    setStatus('ОНЛАЙН', 'online');
    updateDisplay();
  });

  peer.on('call', (call) => {
    incomingCall = call;
    document.getElementById('incomingFrom').textContent = call.peer;
    document.getElementById('incomingOverlay').classList.add('visible');
    setStatus('ВХОДЯЩИЙ ЗВОНОК', 'calling');
    // Ring tone
    let rings = 0;
    const ringInterval = setInterval(() => {
      if (!incomingCall) { clearInterval(ringInterval); return; }
      playTone(880, 0.2, 0.4);
      setTimeout(() => playTone(660, 0.2, 0.4), 200);
      if (++rings > 10) clearInterval(ringInterval);
    }, 1500);
  });

  peer.on('error', (err) => {
    if (err.type === 'unavailable-id') {
      // Try again with different ID
      peer.destroy();
      peer = null;
      setTimeout(initPeer, 500);
      return;
    }
    setStatus('ОШИБКА', 'error');
    showToast('Ошибка подключения', 3000);
    setTimeout(initPeer, 5000);
  });

  peer.on('disconnected', () => {
    setStatus('ПЕРЕПОДКЛЮЧЕНИЕ...', '');
    peer.reconnect();
  });
}

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (!currentCall) {
    if (e.key >= '0' && e.key <= '9') pressKey(e.key);
    if (e.key === '*') pressKey('*');
    if (e.key === '#') pressKey('#');
    if (e.key === 'Backspace') backspace();
    if (e.key === 'Enter') makeCall();
  }
});

initPeer();
</script>
