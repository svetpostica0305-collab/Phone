<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebRTC Звонилка</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a; --panel: #0f1628; --border: #1e3a5f;
  --accent: #00d4ff; --accent2: #00ff88; --danger: #ff3b5c;
  --text: #c8e6ff; --dim: #4a7a9b;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Share Tech Mono',monospace; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:16px; }
.phone { width:100%; max-width:360px; background:var(--panel); border:1px solid var(--border); border-radius:24px; padding:24px 20px; box-shadow:0 0 0 1px rgba(0,212,255,0.1), 0 30px 80px rgba(0,0,0,0.6); position:relative; overflow:hidden; }
.header { text-align:center; margin-bottom:20px; padding-bottom:16px; border-bottom:1px solid var(--border); }
.title { font-family:'Orbitron',sans-serif; font-size:17px; font-weight:900; color:var(--accent); text-shadow:0 0 20px rgba(0,212,255,0.4); letter-spacing:3px; }
.subtitle { font-size:9px; color:var(--dim); margin-top:4px; letter-spacing:2px; }
.status-bar { display:flex; align-items:center; justify-content:center; gap:8px; margin-top:8px; }
.dot { width:8px; height:8px; border-radius:50%; background:var(--dim); transition:all 0.3s; }
.dot.online { background:var(--accent2); box-shadow:0 0 10px var(--accent2); animation:pulse 2s infinite; }
.dot.calling { background:var(--accent); box-shadow:0 0 10px var(--accent); animation:pulse 0.8s infinite; }
.dot.active { background:var(--accent2); box-shadow:0 0 10px var(--accent2); }
.dot.error { background:var(--danger); }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
.status-text { font-size:10px; color:var(--dim); letter-spacing:1px; }

/* Setup screen */
#setupScreen { text-align:center; padding:10px 0 10px; }
.setup-label { font-size:10px; color:var(--dim); letter-spacing:2px; margin-bottom:14px; }
#nicknameInput { background:rgba(0,0,0,0.3); border:1px solid var(--accent); border-radius:10px; color:#fff; font-family:'Orbitron',sans-serif; font-size:22px; letter-spacing:2px; padding:12px 14px; width:100%; text-align:center; outline:none; margin-bottom:12px; }
#nicknameInput::placeholder { color:var(--dim); font-size:14px; }
.btn-save { background:linear-gradient(135deg,#00c853,#00e676); border:none; border-radius:12px; color:#001a00; font-family:'Orbitron',sans-serif; font-size:13px; font-weight:700; letter-spacing:1px; padding:14px; cursor:pointer; width:100%; }

/* My ID */
.my-id-block { background:rgba(0,212,255,0.05); border:1px solid rgba(0,212,255,0.2); border-radius:12px; padding:12px 16px; margin-bottom:16px; text-align:center; }
.my-id-label { font-size:9px; color:var(--dim); letter-spacing:2px; margin-bottom:6px; }
.my-id-value { font-family:'Orbitron',sans-serif; font-size:24px; font-weight:700; color:var(--accent); text-shadow:0 0 20px rgba(0,212,255,0.4); letter-spacing:4px; cursor:pointer; }
.copy-hint { font-size:9px; color:var(--dim); margin-top:4px; letter-spacing:1px; }

/* Display */
.display { background:rgba(0,0,0,0.3); border:1px solid var(--border); border-radius:12px; padding:12px 14px; margin-bottom:14px; display:flex; align-items:center; min-height:52px; }
.display-number { font-family:'Orbitron',sans-serif; font-size:24px; color:#fff; letter-spacing:2px; flex:1; }
.display-placeholder { font-size:13px; color:var(--dim); letter-spacing:1px; flex:1; }
.backspace { background:none; border:none; color:var(--dim); font-size:20px; cursor:pointer; padding:4px 8px; }

/* Keypad */
.keypad { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px; }
.key { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:12px; padding:12px 0; text-align:center; cursor:pointer; user-select:none; transition:all 0.12s; }
.key:active { transform:scale(0.95); border-color:var(--accent); }
.key-digit { font-family:'Orbitron',sans-serif; font-size:19px; font-weight:700; color:#fff; }
.key-letters { font-size:7px; color:var(--dim); letter-spacing:1.5px; margin-top:3px; }

/* Buttons */
.actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.btn { border:none; border-radius:14px; padding:14px; font-family:'Orbitron',sans-serif; font-size:11px; font-weight:700; letter-spacing:1px; cursor:pointer; transition:all 0.15s; }
.btn-call { background:linear-gradient(135deg,#00c853,#00e676); color:#001a00; grid-column:1/-1; box-shadow:0 4px 20px rgba(0,200,83,0.3); }
.btn-call:disabled { background:rgba(255,255,255,0.1); color:var(--dim); box-shadow:none; cursor:not-allowed; }
.btn-hangup { background:linear-gradient(135deg,#c62828,#ff3b5c); color:#fff; grid-column:1/-1; box-shadow:0 4px 20px rgba(255,59,92,0.3); }
.btn-mute, .btn-video { background:rgba(255,255,255,0.03); border:1px solid var(--border); color:var(--text); }
.btn-mute.active, .btn-video.active { background:rgba(0,212,255,0.15); border-color:var(--accent); color:var(--accent); }

/* Call screen */
.call-screen { text-align:center; padding:12px 0; margin-bottom:14px; }
.call-peer { font-family:'Orbitron',sans-serif; font-size:26px; font-weight:700; color:#fff; letter-spacing:4px; margin-bottom:6px; }
.call-timer { font-size:12px; color:var(--accent2); letter-spacing:2px; }

/* Incoming */
.incoming { position:absolute; inset:0; background:rgba(10,14,26,0.97); border-radius:24px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; z-index:10; }
.ring-icon { width:70px; height:70px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex; align-items:center; justify-content:center; font-size:26px; animation:ring 1s ease-in-out infinite; }
@keyframes ring { 0%{box-shadow:0 0 0 0 rgba(0,212,255,0.5)} 70%{box-shadow:0 0 0 22px rgba(0,212,255,0)} 100%{box-shadow:0 0 0 0 rgba(0,212,255,0)} }
.incoming-label { font-size:10px; color:var(--dim); letter-spacing:2px; }
.incoming-from { font-family:'Orbitron',sans-serif; font-size:26px; font-weight:700; color:var(--accent); letter-spacing:4px; text-shadow:0 0 20px rgba(0,212,255,0.4); }
.incoming-btns { display:flex; gap:20px; }
.btn-accept, .btn-decline { width:56px; height:56px; border-radius:50%; border:none; font-size:22px; cursor:pointer; transition:all 0.15s; }
.btn-accept { background:linear-gradient(135deg,#00c853,#00e676); color:#001a00; }
.btn-decline { background:linear-gradient(135deg,#c62828,#ff3b5c); color:#fff; }
.btn-accept:hover, .btn-decline:hover { transform:scale(1.1); }

/* Toast */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:rgba(0,212,255,0.15); border:1px solid rgba(0,212,255,0.3); color:var(--accent); padding:8px 18px; border-radius:20px; font-size:11px; letter-spacing:1px; opacity:0; transition:all 0.3s; pointer-events:none; white-space:nowrap; z-index:200; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="phone" id="phone">

  <!-- Incoming call -->
  <div class="incoming" id="incoming" style="display:none">
    <div class="ring-icon">📞</div>
    <div class="incoming-label">ВХОДЯЩИЙ ЗВОНОК</div>
    <div class="incoming-from" id="incomingFrom">----</div>
    <div class="incoming-btns">
      <button class="btn-accept" onclick="acceptCall()">✓</button>
      <button class="btn-decline" onclick="declineCall()">✕</button>
    </div>
  </div>

  <!-- Header -->
  <div class="header">
    <div class="title">WEBCALL</div>
    <div class="subtitle">WebRTC · P2P · NO SIM</div>
    <div class="status-bar">
      <div class="dot" id="dot"></div>
      <div class="status-text" id="statusText">ПОДКЛЮЧЕНИЕ...</div>
    </div>
  </div>

  <!-- Setup screen -->
  <div id="setupScreen">
    <div class="setup-label">ВЫБЕРИ СВОЙ ID (латиница + цифры)</div>
    <input id="nicknameInput" type="text" maxlength="12" placeholder="например: svet123"
      onkeydown="if(event.key==='Enter')confirmNickname()"/>
    <button class="btn-save" onclick="confirmNickname()">✓ СОХРАНИТЬ ID</button>
  </div>

  <!-- Main UI (hidden until ID set) -->
  <div id="mainUI" style="display:none">

    <!-- My ID -->
    <div class="my-id-block">
      <div class="my-id-label">МОЙ ID (дай другу)</div>
      <div class="my-id-value" id="myId" onclick="copyId()">----</div>
      <div class="copy-hint" id="copyHint">нажми чтобы скопировать</div>
    </div>

    <!-- Call screen -->
    <div id="callScreen" style="display:none">
      <div class="call-screen">
        <div class="call-peer" id="callPeer">----</div>
        <div class="call-timer" id="callTimer">00:00</div>
      </div>
    </div>

    <!-- Dial UI -->
    <div id="dialUI">
      <div class="display">
        <div id="displayNum" class="display-placeholder">введи ID друга...</div>
        <button class="backspace" onclick="backspace()">⌫</button>
      </div>
      <div class="keypad">
        <div class="key" onclick="pressKey('1')"><div class="key-digit">1</div></div>
        <div class="key" onclick="pressKey('2')"><div class="key-digit">2</div><div class="key-letters">ABC</div></div>
        <div class="key" onclick="pressKey('3')"><div class="key-digit">3</div><div class="key-letters">DEF</div></div>
        <div class="key" onclick="pressKey('4')"><div class="key-digit">4</div><div class="key-letters">GHI</div></div>
        <div class="key" onclick="pressKey('5')"><div class="key-digit">5</div><div class="key-letters">JKL</div></div>
        <div class="key" onclick="pressKey('6')"><div class="key-digit">6</div><div class="key-letters">MNO</div></div>
        <div class="key" onclick="pressKey('7')"><div class="key-digit">7</div><div class="key-letters">PQRS</div></div>
        <div class="key" onclick="pressKey('8')"><div class="key-digit">8</div><div class="key-letters">TUV</div></div>
        <div class="key" onclick="pressKey('9')"><div class="key-digit">9</div><div class="key-letters">WXYZ</div></div>
        <div class="key" onclick="pressKey('*')"><div class="key-digit">✱</div></div>
        <div class="key" onclick="pressKey('0')"><div class="key-digit">0</div></div>
        <div class="key" onclick="pressKey('#')"><div class="key-digit">#</div></div>
      </div>
    </div>

    <!-- Action buttons -->
    <div class="actions">
      <button class="btn btn-call" id="callBtn" onclick="makeCall()" disabled>📞 ПОЗВОНИТЬ</button>
      <button class="btn btn-hangup" id="hangupBtn" onclick="hangUp()" style="display:none">📵 ЗАВЕРШИТЬ</button>
      <button class="btn btn-mute" id="muteBtn" onclick="toggleMute()">🎤 МИК</button>
      <button class="btn btn-video" id="videoBtn" onclick="toggleVideo()">📷 ВИДЕО</button>
    </div>

  </div><!-- /mainUI -->
</div>

<div class="toast" id="toast"></div>

<script>
let peer = null, currentCall = null, localStream = null;
let input = '', isMuted = false, isVideo = false;
let timerInterval = null, timerSecs = 0;
let incomingCall = null;

function $(id) { return document.getElementById(id); }

function showToast(msg, dur=2000) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

function setStatus(text, type) {
  $('statusText').textContent = text;
  $('dot').className = 'dot ' + (type||'');
}

function updateDisplay() {
  const el = $('displayNum');
  if (input) {
    el.textContent = input;
    el.className = 'display-number';
  } else {
    el.textContent = 'введи ID друга...';
    el.className = 'display-placeholder';
  }
  $('callBtn').disabled = input.length < 2 || !peer;
}

function pressKey(k) {
  if (currentCall) return;
  input += k;
  updateDisplay();
}

function backspace() {
  input = input.slice(0,-1);
  updateDisplay();
}

function copyId() {
  const id = $('myId').textContent;
  if (id === '----') return;
  navigator.clipboard.writeText(id).then(() => {
    $('copyHint').textContent = '✓ скопировано!';
    setTimeout(() => $('copyHint').textContent = 'нажми чтобы скопировать', 2000);
  });
}

function startTimer() {
  timerSecs = 0;
  timerInterval = setInterval(() => {
    timerSecs++;
    const m = String(Math.floor(timerSecs/60)).padStart(2,'0');
    const s = String(timerSecs%60).padStart(2,'0');
    $('callTimer').textContent = m+':'+s;
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  $('callTimer').textContent = '00:00';
}

function showCallMode(peerId) {
  $('dialUI').style.display = 'none';
  $('callScreen').style.display = 'block';
  $('callPeer').textContent = peerId;
  $('callBtn').style.display = 'none';
  $('hangupBtn').style.display = 'flex';
}

function hideCallMode() {
  $('dialUI').style.display = 'block';
  $('callScreen').style.display = 'none';
  $('callBtn').style.display = 'flex';
  $('hangupBtn').style.display = 'none';
  stopTimer();
}

function onCallEnded() {
  currentCall = null;
  if (localStream) { localStream.getTracks().forEach(t=>t.stop()); localStream=null; }
  hideCallMode();
  setStatus('ОНЛАЙН','online');
  input = '';
  updateDisplay();
}

async function getMedia() {
  try { return await navigator.mediaDevices.getUserMedia({audio:true, video:isVideo}); }
  catch(e) {
    try { return await navigator.mediaDevices.getUserMedia({audio:true}); }
    catch(e2) { showToast('⚠ Нет доступа к микрофону!',3000); return null; }
  }
}

async function makeCall() {
  if (!peer || !input.trim()) return;
  const target = input.trim();
  localStream = await getMedia();
  if (!localStream) return;
  const call = peer.call(target, localStream);
  currentCall = call;
  showCallMode(target);
  setStatus('ЗВОНОК...','calling');
  call.on('stream', () => { setStatus('РАЗГОВОР','active'); startTimer(); });
  call.on('close', onCallEnded);
  call.on('error', (e) => { showToast('Ошибка: '+e.message,3000); onCallEnded(); });
}

function hangUp() {
  if (currentCall) currentCall.close();
  onCallEnded();
}

async function acceptCall() {
  if (!incomingCall) return;
  $('incoming').style.display = 'none';
  localStream = await getMedia();
  if (!localStream) return;
  incomingCall.answer(localStream);
  currentCall = incomingCall;
  const peerId = incomingCall.peer;
  incomingCall = null;
  showCallMode(peerId);
  currentCall.on('stream', () => { setStatus('РАЗГОВОР','active'); startTimer(); });
  currentCall.on('close', onCallEnded);
}

function declineCall() {
  if (incomingCall) { incomingCall.close(); incomingCall = null; }
  $('incoming').style.display = 'none';
  setStatus('ОНЛАЙН','online');
}

function toggleMute() {
  isMuted = !isMuted;
  if (localStream) localStream.getAudioTracks().forEach(t=>t.enabled=!isMuted);
  $('muteBtn').textContent = isMuted ? '🔇 БЕЗ ЗВУКА' : '🎤 МИК';
  $('muteBtn').classList.toggle('active', isMuted);
}

function toggleVideo() {
  isVideo = !isVideo;
  $('videoBtn').textContent = isVideo ? '📷 ВИДЕО ВКЛ' : '📷 ВИДЕО';
  $('videoBtn').classList.toggle('active', isVideo);
  showToast(isVideo ? 'Видео включено' : 'Только аудио');
}

function confirmNickname() {
  const val = $('nicknameInput').value.trim().toLowerCase().replace(/[^a-z0-9]/g,'');
  if (val.length < 2) { showToast('Минимум 2 символа!'); return; }
  localStorage.setItem('myPeerId', val);
  $('setupScreen').style.display = 'none';
  $('mainUI').style.display = 'block';
  initPeer(val);
}

function initPeer(id) {
  setStatus('ПОДКЛЮЧЕНИЕ...','');
  peer = new Peer(id, {
    host: '0.peerjs.com', port: 443, path: '/', secure: true, debug: 0,
    config: { iceServers: [
      {urls:'stun:stun.l.google.com:19302'},
      {urls:'stun:stun1.l.google.com:19302'}
    ]}
  });

  peer.on('open', (openId) => {
    $('myId').textContent = openId;
    setStatus('ОНЛАЙН','online');
    updateDisplay();
  });

  peer.on('call', (call) => {
    incomingCall = call;
    $('incomingFrom').textContent = call.peer;
    $('incoming').style.display = 'flex';
    setStatus('ВХОДЯЩИЙ ЗВОНОК','calling');
  });

  peer.on('error', (err) => {
    if (err.type === 'unavailable-id') {
      showToast('ID уже занят! Выбери другой.',3000);
      localStorage.removeItem('myPeerId');
      peer.destroy(); peer = null;
      $('setupScreen').style.display = 'block';
      $('mainUI').style.display = 'none';
      return;
    }
    setStatus('ОШИБКА','error');
    showToast('Ошибка подключения',3000);
  });

  peer.on('disconnected', () => {
    setStatus('ПЕРЕПОДКЛЮЧЕНИЕ...','');
    peer.reconnect();
  });
}

// Start
const savedId = localStorage.getItem('myPeerId');
if (savedId) {
  $('setupScreen').style.display = 'none';
  $('mainUI').style.display = 'block';
  initPeer(savedId);
} else {
  $('setupScreen').style.display = 'block';
  $('mainUI').style.display = 'none';
  setStatus('ВВЕДИ ID','');
}

document.addEventListener('keydown', e => {
  if (!currentCall) {
    if (e.key>='0'&&e.key<='9') pressKey(e.key);
    if (e.key==='Backspace') backspace();
    if (e.key==='Enter') makeCall();
  }
});
</script>
</body>
</html>
